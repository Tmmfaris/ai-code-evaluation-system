name: Evaluation Guardrails CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-evaluation-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run deterministic guardrails
        run: pytest tests/test_deterministic_guardrails.py -q

      - name: Run regressions
        run: pytest tests/test_regressions.py -q

      - name: Run python universal coverage
        run: pytest tests/test_python_universal.py -q
